═══════════════════════════════════════ */
function renderAll(view){
  updateTabBadges();
  renderAlertStrip('alerts-strip');
  renderAlertStrip('sched-alerts');
  renderStats();
  const activeTab=document.querySelector('.tab.active');
  const tabId=activeTab?.id||'';
  initFilterBar();
  if(view==='weekly'  ||tabId==='tab-weekly')  renderWeekly();
  if(view==='daily'   ||tabId==='tab-daily')   renderDaily();
  if(view==='monthly' ||tabId==='tab-monthly') renderMonthly();
  if(view==='schedules'||tabId==='tab-schedules') renderSchedules();
  if(view==='papers'  ||tabId==='tab-papers')  renderPapers();
  if(view==='income'  ||tabId==='tab-income')  renderIncome();
}


/* ═══════════════════════════════════════
   PRE-DRAG COLOR SELECTION
═══════════════════════════════════════ */
let activeColor = 'mint'; // 드래그 전 선택된 색상

const COLOR_NAMES=Object.fromEntries(Object.entries(PALETTE).map(([k,v])=>[k,v.name||k]));

// activePreset: {type:'sched'|'mission'|'appt'|'event', id:null|int, color:string, label:string}
let activePreset = {cat:'free', subType:'appt', id:null, color:'pink', label:'🤝 약속', repeat:'none'};

function initPalette(){
  const subBtns=document.getElementById('palette-sub-btns');
  if(!subBtns)return;

  // ── 유형 버튼
  subBtns.innerHTML=SUB_TYPES.map(t=>{
    const isSel=activePreset.subType===t.id;
    const c=PALETTE[isSel?activePreset.color:t.defaultColor]||PALETTE.mint;
    return`<div class="psub-btn ${isSel?'active':''}"
      style="${isSel?`background:${c.bg};border-color:${c.border};color:${c.text}`:''}"
      onclick="selectSubType('${t.id}')">${t.label}</div>`;
  }).join('');

  // ── 스케줄/미션 목록
  const activeScheds=DB.schedules.filter(s=>schedProgress(s)<100);
  const activeMissions=DB.missions.filter(m=>missionProgress(m)<100);
  let schedHtml='';
  // "없음" 선택지
  const noSel=!activePreset.schedId&&!activePreset.missionId;
  schedHtml+=`<div class="psub-btn ${noSel?'active':''}"
    style="${noSel?'background:var(--bg4);border-color:var(--border2);color:var(--text)':''}"
    onclick="selectSchedItem(null,null)">없음</div>`;
  activeScheds.forEach(s=>{
    const c=PALETTE[s.color]||PALETTE.mint;
    const sel=activePreset.schedId===s.id&&!activePreset.missionId;
    schedHtml+=`<div class="psub-btn ${sel?'active':''}"
      style="${sel?`background:${c.bg};border-color:${c.border};color:${c.text}`:''}"
      onclick="selectSchedItem(${s.id},null)">
      <div style="width:8px;height:8px;border-radius:50%;background:${c.hex};flex-shrink:0"></div>
      ${s.name.slice(0,14)}</div>`;
  });
  activeMissions.forEach(m=>{
    const sc=DB.schedules.find(x=>x.id===m.schedId);
    const c=PALETTE[sc?sc.color:'mint']||PALETTE.mint;
    const sel=activePreset.missionId===m.id;
    schedHtml+=`<div class="psub-btn ${sel?'active':''}"
      style="${sel?`background:${c.bg};border-color:${c.border};color:${c.text}`:''};padding-left:18px"
      onclick="selectSchedItem(${sc?sc.id:null},${m.id})">
      <div style="width:6px;height:6px;border-radius:50%;background:${c.hex};opacity:.7;flex-shrink:0"></div>
      🎯 ${m.name.slice(0,13)}</div>`;
  });
  document.getElementById('palette-sched-list').innerHTML=schedHtml;

  // ── 색상 팔레트
  const sw=document.getElementById('palette-swatches');
  if(sw) sw.innerHTML=Object.entries(PALETTE).map(([k,v])=>
    `<div class="pswatch ${activePreset.color===k?'active':''}" id="psw-${k}"
      style="background:${v.hex}" title="${COLOR_NAMES[k]||k}"
      onclick="selectPresetColor('${k}')"></div>`
  ).join('');

  // ── 반복 버튼
  const repBtns=document.getElementById('palette-repeat-btns');
  if(repBtns){
    const repeats=[{id:'none',label:'없음'},{id:'daily',label:'매일'},{id:'weekly',label:'매주'},{id:'monthly',label:'매월'}];
    repBtns.innerHTML=repeats.map(r=>
      `<div class="prep-btn ${activePreset.repeat===r.id?'active':''}" onclick="selectRepeat('${r.id}')">${r.label}</div>`
    ).join('');
  }

  // ── 선택 표시
  const c=PALETTE[activePreset.color]||PALETTE.mint;
  const el=document.getElementById('active-color-label');
  if(el) el.innerHTML=`<span style="color:${c.hex};font-weight:700">● ${activePreset.label}</span>${activePreset.repeat!=='none'?' · '+{daily:'매일',weekly:'매주',monthly:'매월'}[activePreset.repeat]:''}`;

  activeColor=activePreset.color;
}

function selectSubType(subId){
  const sub=SUB_TYPE_MAP[subId]||SUB_TYPES[0];
  activePreset.subType=subId;
  activePreset.color=sub.defaultColor;
  activePreset.label=sub.label;
  initPalette();
}
function selectSchedItem(schedId,missionId){
  activePreset.schedId=schedId?parseInt(schedId):null;
  activePreset.missionId=missionId?parseInt(missionId):null;
  initPalette();
}
function selectRepeat(r){activePreset.repeat=r;initPalette();}
function selectPresetColor(k){activePreset.color=k;initPalette();}
function selectActiveColor(k){activePreset.color=k;initPalette();}
function selectPreset(type,id,color,label){initPalette();}
function selectPresetType(type){initPalette();}
function selectCat(cat){initPalette();}

function selectActiveColor(k){activePreset.color=k;initPalette();}
function selectPreset(type,id,color,label){initPalette();}
function selectPresetType(type){initPalette();}

function updateActivelabel(){
  const el=document.getElementById('active-color-label');
  if(!el)return;
  const c=PALETTE[activePreset.color]||PALETTE.mint;
  const label=activePreset.label||COLOR_NAMES[activePreset.color]||activePreset.color;
  el.innerHTML=`<span style="color:${c.hex};font-weight:700">● ${label}</span> 블록으로 드래그`;
}

/* ═══════════════════════════════════════
   COLOR FILTER
═══════════════════════════════════════ */
let filterColor = null; // null = 전체

function initFilterBar(){
  const bar = document.getElementById('filter-bar');
  if(!bar) return;
  // remove old swatches except "all"
  bar.querySelectorAll('.fswatch:not(.all),.filter-name').forEach(e=>e.remove());
  Object.entries(PALETTE).forEach(([k,v])=>{
    const el=document.createElement('div');
    el.className='fswatch'+(filterColor===k?' active':'');
    el.id='fsw-'+k;
    el.style.background=v.hex;
    el.title=COLOR_NAMES[k]||k;
    el.onclick=()=>setFilter(k);
    bar.appendChild(el);
  });
  if(filterColor){
    const lbl=document.createElement('span');
    lbl.className='filter-name';
    const c=PALETTE[filterColor]||PALETTE.mint;
    lbl.innerHTML=`<span style="color:${c.hex};font-weight:700">${COLOR_NAMES[filterColor]}</span> 만 표시`;
    bar.appendChild(lbl);
  }
}

function setFilter(color){
  filterColor=color;
  document.querySelectorAll('.fswatch').forEach(el=>el.classList.remove('active'));
  const key=color?'fsw-'+color:'fsw-all';
  const el=document.getElementById(key);
  if(el)el.classList.add('active');
  initFilterBar();
  renderAll();
}

/* ═══════════════════════════════════════
   MONTHLY VIEW
═══════════════════════════════════════ */
let monthOff=0;

function changeMonth(d){monthOff+=d;renderMonthly();}

function renderMonthly(){
  const now=today();
  const base=new Date(now.getFullYear(), now.getMonth()+monthOff, 1);
  const year=base.getFullYear(), month=base.getMonth();
  document.getElementById('month-title').textContent=`${year}년 ${month+1}월`;

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();
  const ts=fmt(today());

  const grid=document.getElementById('month-grid');
  const DNAMES=['일','월','화','수','목','금','토'];
  let h=DNAMES.map(d=>`<div class="mgh">${d}</div>`).join('');

  // prev month padding
  for(let i=firstDay-1;i>=0;i--){
    const day=daysInPrev-i;
    h+=`<div class="mgc other-month"><div class="mgc-num">${day}</div></div>`;
  }
  // current month
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isTod=ds===ts;
    const dayBlocks=DB.blocks.filter(b=>b.date===ds&&(!filterColor||b.color===filterColor));
    const allDayScheds=DB.schedules.filter(s=>s.progress<100&&s.start<=ds&&s.end>=ds&&(!filterColor||s.color===filterColor));
    const isOut=filterColor&&!dayBlocks.length&&!allDayScheds.length;
    h+=`<div class="mgc ${isTod?'today':''} ${isOut?'filtered-out':''}" onclick="jumpToDay('${ds}')">
      <div class="mgc-num ${isTod?'today-num':''}">${day}</div>
      ${allDayScheds.slice(0,1).map(s=>{
        const c=PALETTE[s.color]||PALETTE.mint;
        return`<div class="mblock" style="background:${c.bg};color:${c.text}">${s.name}</div>`;
      }).join('')}
      ${dayBlocks.slice(0,2).map(b=>{
        const c=PALETTE[b.color]||PALETTE.mint;
        return`<div class="mblock" style="background:${c.bg};color:${c.text}">${b.sh}시 ${b.title}</div>`;
      }).join('')}
      ${dayBlocks.length+allDayScheds.length>3?`<div style="font-size:10px;color:var(--text3)">+${dayBlocks.length+allDayScheds.length-3}개</div>`:''}
    </div>`;
  }
  // next month padding
  const total=firstDay+daysInMonth;
  const remaining=total%7===0?0:7-(total%7);
  for(let i=1;i<=remaining;i++){
    h+=`<div class="mgc other-month"><div class="mgc-num">${i}</div></div>`;
  }
  grid.innerHTML=h;
}

function jumpToDay(ds){
  // 일간 뷰로 이동
  const d=pd(ds);
  const now=today();
  now.setHours(0,0,0,0);
  dayOff=Math.round((d-now)/86400000);
  goTo('daily', document.querySelector('.tab'));
  document.querySelectorAll('.tab').forEach(t=>{
    if(t.textContent.includes('일간')){t.click();}
  });
}

/* ── PWA Install prompt ── */
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  _deferredPrompt=e;
  document.getElementById('pwa-install-bar').style.display='flex';
});
window.addEventListener('appinstalled', ()=>{
  document.getElementById('pwa-install-bar').style.display='none';
});
function installPWA(){
  if(!_deferredPrompt)return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(()=>{ _deferredPrompt=null; document.getElementById('pwa-install-bar').style.display='none'; });
}
