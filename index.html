<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>진아 스케줄러</title>
<meta name="description" content="진아의 스케줄·미션·논문 관리 앱">
<meta name="theme-color" content="#f06496">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="진아 스케줄러">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--bg2:#ffffff;--bg3:#f0f1f4;--bg4:#e4e6ec;--bg5:#d4d7e0;
  --border:#e2e4ea;--border2:#d0d3dc;--border3:#b8bcc8;
  --text:#1a1c24;--text2:#636780;--text3:#a0a4b8;
  --accent:#1aaa80;--accent-d:#0a5a40;--accent-l:#d4f5ec;
  --warn:#d07010;--warn-l:#fff3d8;--warn-d:#a05000;
  --danger:#c83030;--danger-l:#fde8e8;--danger-d:#901818;
  --info:#2870c8;--info-l:#e4eefa;
  --purple:#6050d8;--purple-l:#eeecfa;
  --pink:#c03880;--pink-l:#fce8f2;
  --r:12px;--rsm:8px;--rxs:5px;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-family:'Pretendard',sans-serif;font-size:14px;display:flex;flex-direction:column}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer;border:none;background:none;color:var(--text)}

/* ── Topbar ── */
.topbar{flex-shrink:0;background:rgba(245,246,248,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:0;z-index:100}
.brand{display:flex;align-items:baseline;gap:10px;padding:13px 16px 13px 0;border-right:1px solid var(--border);margin-right:4px;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.tabs{display:flex;align-items:stretch;gap:0}
.tab{padding:0 16px;height:50px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{background:var(--danger);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.tab-badge.w{background:var(--warn);color:#1a0e00}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:6px;padding-left:12px}
.btn-add{background:var(--accent);color:#fff;border-radius:var(--rxs);padding:7px 13px;font-weight:700;font-size:13px;transition:opacity .15s;white-space:nowrap}
.btn-add:hover{opacity:.85}
.btn-ghost{background:var(--bg3);color:var(--text2);border-radius:var(--rxs);padding:7px 13px;font-size:13px;border:1px solid var(--border2);transition:all .15s;white-space:nowrap}
.btn-ghost:hover{color:var(--text);border-color:var(--border3)}

/* ── App body ── */
.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.section{display:none;flex:1;overflow:hidden;flex-direction:column}
.section.active{display:flex}

/* ── Weekly ── */
.week-view{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 22px 0}
.week-topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0}
.week-title{flex:1;font-size:14px;font-weight:700;letter-spacing:-.3px}
.wk-arrow{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rxs);padding:5px 13px;color:var(--text2);font-size:16px;transition:all .15s}
.wk-arrow:hover{color:var(--text);border-color:var(--border3)}
.today-btn{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-d);border-radius:var(--rxs);padding:5px 11px;font-size:12px;font-weight:700}
.hint{font-size:11px;color:var(--text3);padding:4px 9px;background:var(--bg3);border-radius:var(--rxs);border:1px solid var(--border)}

.alerts-strip{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;flex-shrink:0}
.alert-chip{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--rxs);font-size:12px;border:1px solid;border-left-width:2px}
.ac-d{background:var(--danger-l);border-color:var(--danger-d);border-left-color:var(--danger);color:#e88}
.ac-w{background:var(--warn-l);border-color:var(--warn-d);border-left-color:var(--warn);color:#d8a040}
.ac-d b,.ac-w b{color:inherit;font-weight:700}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px;flex-shrink:0}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}
.stat-num{font-size:21px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:1px}

.grid-scroll{flex:1;overflow-y:auto;overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
.week-grid{display:grid;grid-template-columns:52px repeat(7,1fr);min-width:720px;position:relative}
.gh{background:var(--bg3);padding:9px 5px;text-align:center;font-size:11px;font-weight:500;border-bottom:1px solid var(--border);color:var(--text2);position:sticky;top:0;z-index:10;border-right:1px solid var(--border)}
.gh.today{color:var(--accent);font-weight:700}
.gday{font-size:17px;font-weight:700;color:var(--text);display:block;line-height:1.2;margin-top:2px}
.gday.tn{background:var(--accent);color:#082820;border-radius:50%;width:27px;height:27px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.gt{display:flex;align-items:flex-start;justify-content:center;padding-top:3px;color:var(--text3);font-size:10px;font-family:'DM Mono',monospace;background:var(--bg3);border-right:1px solid var(--border);border-bottom:1px solid var(--border);user-select:none;height:52px}
.gc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;cursor:crosshair;transition:background .08s;height:52px;background:var(--bg2)}
.gc:last-child{border-right:none}
.gc:hover{background:rgba(10,90,64,.04)}
.gc.drag-over{background:rgba(10,90,64,.10)}
.tblock{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 6px;font-size:11px;font-weight:600;overflow:hidden;cursor:pointer;user-select:none;z-index:5;border:1px solid rgba(255,255,255,.1)}
.tblock:hover{filter:brightness(1.15)}
.tblock .tb-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.tblock .tb-time{font-size:10px;opacity:.7;font-family:'DM Mono',monospace}
.drag-ghost{position:absolute;left:2px;right:2px;border-radius:5px;background:rgba(26,170,128,.15);border:2px dashed var(--accent);pointer-events:none;z-index:20}

/* ── Schedule view ── */
.sched-view{flex:1;overflow-y:auto;padding:14px 22px}
.sched-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.sched-card:hover{border-color:var(--border2)}
.sched-head{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.sched-accent{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;margin:-13px 0}
.sched-title-row{flex:1;min-width:0}
.sched-name{font-size:14px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sched-meta{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;display:flex;gap:11px;flex-wrap:wrap}
.sched-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sched-body{padding:13px 17px}
.prog-wrap{margin-bottom:11px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px}
.prog-pct{font-weight:700;font-family:'DM Mono',monospace}
.prog-track{background:var(--bg4);border-radius:99px;height:7px;position:relative;overflow:visible}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.prog-exp{position:absolute;top:-2px;width:2px;height:11px;background:rgba(255,255,255,.3);border-radius:1px}
.urg{padding:7px 11px;border-radius:var(--rxs);font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:11px;font-weight:600;border:1px solid}
.urg-crit{background:var(--danger-l);color:var(--danger);border-color:var(--danger-d)}
.urg-high{background:var(--warn-l);color:var(--warn);border-color:var(--warn-d)}
.urg-ok{background:var(--accent-l);color:var(--accent);border-color:var(--accent-d)}
.urg-done{background:var(--bg3);color:var(--text2);border-color:var(--border2)}
.missions{display:flex;flex-direction:column;gap:5px}
.mrow{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:9px 12px;display:flex;align-items:center;gap:10px}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:600;margin-bottom:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mmeta{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.mprog{width:100px;flex-shrink:0}
.mpct{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;text-align:right;margin-bottom:2px}

/* ── Paper view ── */
.paper-view{flex:1;overflow-y:auto;padding:14px 22px}
.paper-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.paper-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.paper-head{padding:13px 17px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.paper-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.paper-title-row{flex:1;min-width:0}
.paper-title{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.paper-meta{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;display:flex;gap:10px;flex-wrap:wrap}
.paper-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.paper-body{padding:0 17px 13px}
.read-log-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.read-log-row:last-child{border-bottom:none}

/* ── Badges & Buttons ── */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--accent-l);color:var(--accent)}
.b-orange{background:var(--warn-l);color:var(--warn)}
.b-red{background:var(--danger-l);color:var(--danger)}
.b-blue{background:var(--info-l);color:var(--info)}
.b-gray{background:var(--bg4);color:var(--text2)}
.btn{padding:5px 10px;border-radius:var(--rxs);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{color:var(--text);border-color:var(--border3)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-del{color:var(--text3)}
.btn-del:hover{background:var(--danger-l);color:var(--danger);border-color:var(--danger-d)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.btn-primary:hover{opacity:.85}
.caret{font-size:10px;color:var(--text3);transition:transform .2s;display:inline-block}
.caret.open{transform:rotate(90deg)}
.log-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.log-row:last-child{border-bottom:none}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(7px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:22px;width:430px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxs);padding:8px 11px;color:var(--text);outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:58px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.modal-foot{display:flex;justify-content:flex-end;gap:7px;margin-top:16px}
.form-hint{font-size:11px;color:var(--text3);margin-top:3px}
.prog-input-wrap{display:flex;align-items:center;gap:8px}
.prog-input-wrap input[type=range]{flex:1;accent-color:var(--accent)}
.pvd{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;min-width:36px;text-align:right}

/* ── Block modal: color picker ── */
.color-section-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.color-grid{display:flex;flex-direction:column;gap:6px}
.color-group{display:flex;align-items:center;gap:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxs);overflow:hidden;cursor:pointer;transition:border-color .15s}
.color-group:hover{border-color:var(--border3)}
.color-group.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.color-swatch{width:6px;align-self:stretch;flex-shrink:0}
.color-group-info{flex:1;padding:9px 12px;min-width:0}
.color-group-name{font-size:13px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-group-sub{font-size:11px;color:var(--text2)}
.color-group-badge{flex-shrink:0;padding:8px 10px;display:flex;align-items:center}
/* free block color pickers */



/* ── Daily view ── */
.daily-view{flex:1;display:flex;overflow:hidden;padding:14px 22px 0;gap:16px}
.daily-left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.daily-right{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-bottom:14px}
.daily-topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0}
.daily-title{flex:1;font-size:15px;font-weight:700;letter-spacing:-.3px}
.daily-scroll{flex:1;overflow-y:auto;overflow-x:hidden;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
.day-grid{display:grid;grid-template-columns:52px 1fr;position:relative}
.dh-row{grid-column:1/-1;display:grid;grid-template-columns:52px 1fr;background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.dh-time{padding:10px 0;text-align:center;font-size:11px;color:var(--text3);border-right:1px solid var(--border)}
.dh-day{padding:10px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px}
.dh-day-num{font-size:22px;font-weight:700;color:var(--accent)}
.dh-day-sub{font-size:12px;color:var(--text2)}
.dt{display:flex;align-items:flex-start;justify-content:center;padding-top:3px;color:var(--text3);font-size:10px;font-family:"DM Mono",monospace;background:var(--bg3);border-right:1px solid var(--border);border-bottom:1px solid var(--border);user-select:none;height:60px}
.dc{border-bottom:1px solid var(--border);position:relative;cursor:crosshair;transition:background .08s;height:60px;background:var(--bg2)}
.dc:hover{background:rgba(10,90,64,.04)}
.dc.now-line::before{content:"";position:absolute;left:0;right:0;height:2px;background:var(--danger);opacity:.7;z-index:8;top:var(--now-top,0)}
/* daily tblock slightly wider padding */
.daily-scroll .tblock{font-size:12px;padding:4px 8px}
.daily-scroll .tblock .tb-title{font-size:12px;white-space:normal;line-height:1.4;max-height:2.8em;overflow:hidden}
.daily-scroll .tblock .tb-time{font-size:11px}
/* right panel */
.dpanel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.dpanel-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.dpanel-item{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.dpanel-item:last-child{border-bottom:none}
.dpanel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dpanel-add{width:100%;padding:8px;border-radius:var(--rxs);border:1px dashed var(--border2);color:var(--text3);font-size:12px;text-align:center;cursor:pointer;transition:all .15s;background:none;margin-top:6px}
.dpanel-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.day-hour-total{font-size:12px;color:var(--text2);font-family:"DM Mono",monospace;padding:4px 0}

/* ── Pre-drag color palette (일간 뷰 오른쪽) ── */
.color-palette-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;flex-shrink:0}
.palette-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.palette-swatches{display:flex;flex-wrap:wrap;gap:7px}
.pswatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.pswatch.active{border-color:var(--text);transform:scale(1.15)}
.active-color-label{font-size:11px;color:var(--text2);margin-top:7px}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:7px;padding:8px 22px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;flex-shrink:0}
.fswatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0;opacity:.5}
.fswatch.active{border-color:var(--text);opacity:1;transform:scale(1.1)}
.fswatch.all{background:linear-gradient(135deg,#e43072,#9080f0,#1aaa80);opacity:.7}
.fswatch.all.active{opacity:1}
.filter-name{font-size:11px;color:var(--text2);padding:2px 8px;border-radius:99px;background:var(--bg3);border:1px solid var(--border2)}

/* ── Monthly view ── */
.month-view{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 22px 0}
.month-topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0}
.month-title{flex:1;font-size:16px;font-weight:700;letter-spacing:-.4px}
.month-scroll{flex:1;overflow-y:auto}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.mgh{background:var(--bg3);padding:7px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.mgc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 5px;min-height:90px;background:var(--bg2);vertical-align:top;cursor:pointer;transition:background .1s}
.mgc:hover{background:var(--bg3)}
.mgc.today{background:var(--accent-l)}
.mgc.other-month{background:var(--bg3);opacity:.6}
.mgc-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px}
.mgc-num.today-num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.mblock{border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.mgc.filtered-out{opacity:.15}

/* ── Income view ── */
.income-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.income-head{padding:12px 16px;display:flex;align-items:center;gap:10px}
.income-body{padding:0 16px 14px}
.income-table{width:100%;border-collapse:collapse;font-size:13px}
.income-table th{text-align:left;padding:6px 10px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3)}
.income-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.income-table tr:last-child td{border-bottom:none}
.income-total{background:var(--accent-l);border-top:2px solid var(--accent)}
.income-total td{font-weight:700;color:var(--accent-d);padding:10px 10px}
.income-summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.income-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px}
.income-stat-num{font-size:20px;font-weight:700;font-family:"DM Mono",monospace;letter-spacing:-.5px}
.income-stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

.pcat-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rxs);cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg3);transition:all .12s;color:var(--text)}
.pcat-btn:hover{border-color:var(--border2);background:var(--bg4)}
.pcat-btn.active{font-weight:700;border-width:2px}
.psub-btn{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--rxs);cursor:pointer;font-size:12px;border:1px solid var(--border);background:transparent;transition:all .12s;color:var(--text2)}
.psub-btn:hover{color:var(--text);background:var(--bg3)}
.psub-btn.active{font-weight:700;border-width:2px;color:var(--text)}
.prep-btn{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text2);transition:all .12s}
.prep-btn:hover{border-color:var(--border3);color:var(--text)}
.prep-btn.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}

.tb-del-btn{position:absolute;top:3px;right:4px;font-size:10px;cursor:pointer;
  opacity:0;transition:opacity .15s;color:inherit;padding:1px 4px;
  border-radius:3px;background:rgba(0,0,0,.15)}
.tblock:hover .tb-del-btn{opacity:.8}
.tb-del-btn:hover{opacity:1!important;background:rgba(0,0,0,.3)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand" onclick="goToHome()" title="홈으로 (일간 입력)"
    style="cursor:pointer;transition:opacity .15s" onmouseenter="this.style.opacity='.75'" onmouseleave="this.style.opacity='1'">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="brand-name">🌸 진아 스케줄러</div>
    </div>
    <div class="brand-date" id="today-label"></div>
  </div>
  <div class="tabs">
    <div class="tab" onclick="goTo('daily',this)" id="tab-daily">📋 일간 입력</div>
    <div class="tab" onclick="goTo('weekly',this)" id="tab-weekly">🗓 주간 뷰</div>
    <div class="tab" onclick="goTo('monthly',this)" id="tab-monthly">📅 월간 뷰</div>
    <div class="tab" onclick="goTo('schedules',this)" id="tab-schedules">🗂 프로젝트 관리
      <span class="tab-badge" id="tb-danger" style="display:none"></span>
      <span class="tab-badge w" id="tb-warn" style="display:none"></span>
    </div>
    <div class="tab" onclick="goTo('papers',this)" id="tab-papers">📄 논문 관리</div>
    <div class="tab" onclick="goTo('income',this)" id="tab-income">💰 수입 관리</div>
  </div>
  <div class="topbar-actions">
    <button class="btn-ghost" onclick="openMissionModal(null)">＋ 미션</button>
    <button class="btn-ghost" onclick="openPaperModal()">＋ 논문</button>
    <button class="btn-add" onclick="openSchedModal()">＋ 스케줄</button>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar" id="filter-bar">
  <span class="filter-label">색상 필터</span>
  <div class="fswatch all active" id="fsw-all" onclick="setFilter(null)" title="전체 보기"></div>
</div>

<!-- App body -->
<div class="app-body">

  <!-- Weekly -->
  <div id="sec-weekly" class="section">
    <div class="week-view">
      <div class="week-topbar">
        <button class="wk-arrow" onclick="changeWeek(-1)">‹</button>
        <div class="week-title" id="week-range"></div>
        <button class="wk-arrow" onclick="changeWeek(1)">›</button>
        <button class="today-btn" onclick="weekOff=0;renderWeekly()">오늘로</button>
        <div class="hint">↕ 드래그 → 시간 블록 추가</div>
      </div>
      <div class="alerts-strip" id="alerts-strip"></div>
      <div class="stats-bar" id="stats-bar"></div>
      <div class="grid-scroll" id="grid-scroll">
        <div id="week-grid" class="week-grid"></div>
      </div>
    </div>
  </div>


  <!-- Daily -->
  <div id="sec-daily" class="section active">
    <div class="daily-view">
      <div class="daily-left">
        <div class="daily-topbar">
          <button class="wk-arrow" onclick="changeDay(-1)">‹</button>
          <div class="daily-title" id="daily-title"></div>
          <button class="wk-arrow" onclick="changeDay(1)">›</button>
          <button class="today-btn" onclick="dayOff=0;renderDaily()">오늘</button>
          <div class="hint">↕ 드래그 → 블록 추가</div>
        </div>
        <div class="daily-scroll" id="daily-scroll">
          <div id="day-grid" class="day-grid"></div>
        </div>
      </div>
      <div class="daily-right">
        <div class="color-palette-panel" id="pre-drag-palette">
          <div class="palette-title">드래그 설정</div>

          <!-- 세부 유형 (약속/회의/교육/프로젝트/공부) -->
          <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px">유형</div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px" id="palette-sub-btns"></div>

          <!-- 스케줄/미션 목록 -->
          <div id="palette-sub-sched">
            <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px">스케줄 연결 <span style="font-weight:400;color:var(--text3)">(선택)</span></div>
            <div id="palette-sched-list" style="margin-bottom:12px"></div>
          </div>

          <!-- 색상 -->
          <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">색상</div>
          <div class="palette-swatches" id="palette-swatches" style="margin-bottom:12px"></div>

          <!-- 반복 설정 -->
          <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:2px">
            <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px">반복</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap" id="palette-repeat-btns"></div>
          </div>

          <!-- 현재 선택 표시 -->
          <div class="active-color-label" id="active-color-label" style="margin-top:10px"></div>
        </div>
        <div id="daily-right"></div>
      </div>
    </div>
  </div>

  <!-- Schedules -->
  <div id="sec-schedules" class="section">
    <div class="sched-view">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:16px;font-weight:700;letter-spacing:-.4px">프로젝트 관리</div>
        <button class="btn-add" onclick="openSchedModal()">＋ 프로젝트 추가</button>
      </div>
      <div class="alerts-strip" id="sched-alerts" style="margin-bottom:12px"></div>
      <div id="sched-list"></div>
    </div>
  </div>

  <!-- Monthly -->
  <div id="sec-monthly" class="section">
    <div class="month-view">
      <div class="month-topbar">
        <button class="wk-arrow" onclick="changeMonth(-1)">‹</button>
        <div class="month-title" id="month-title"></div>
        <button class="wk-arrow" onclick="changeMonth(1)">›</button>
        <button class="today-btn" onclick="monthOff=0;renderMonthly()">이번 달</button>
      </div>
      <div class="month-scroll">
        <div id="month-grid" class="month-grid"></div>
      </div>
    </div>
  </div>

  <!-- Papers -->
  <div id="sec-papers" class="section">
    <div class="paper-view">
      <div class="paper-hd">
        <div style="font-size:16px;font-weight:700;letter-spacing:-.4px">논문 관리</div>
        <button class="btn-add" onclick="openPaperModal()">＋ 논문 추가</button>
      </div>
      <div id="paper-list"></div>
    </div>
  </div>

</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- Schedule modal -->
<div id="m-sched" class="overlay" style="display:none">
<div class="modal">
  <div class="modal-title" id="m-sched-title">프로젝트 추가</div>
  <div class="form-row"><label>프로젝트명</label><input id="s-name" placeholder="예: 논문 작성, 강의 준비"></div>
  <div class="grid2">
    <div class="form-row"><label>시작일 <span style="font-weight:400;color:var(--text3)">(미정이면 비워두세요)</span></label><input id="s-start" type="date"></div>
    <div class="form-row"><label>마감일 <span style="font-weight:400;color:var(--text3)">(미정이면 비워두세요)</span></label><input id="s-end" type="date"></div>
  </div>
  <div class="grid2">
    <div class="form-row"><label>총 소요기간 (일)</label><input id="s-days" type="number" min="1" placeholder="실제 작업 일수"></div>
    <div class="form-row"><label>목표 작업시간 (h)</label><input id="s-hours" type="number" min="0" step="0.5" placeholder="예: 40">
      <div class="form-hint">입력 시 달성률 자동 계산</div>
    </div>
  </div>
  <div class="form-row"><label>색상</label>
    <div style="display:flex;gap:8px;margin-top:4px" id="s-color-picker"></div>
  </div>
  <div class="grid2">
    <div class="form-row"><label>수동 달성률 (%)</label><input id="s-prog" type="number" min="0" max="100" value="0">
      <div class="form-hint">목표시간 미설정 시 사용</div>
    </div>
    <div></div>
  </div>
  <div class="form-row"><label>메모</label><textarea id="s-memo" placeholder="참고사항"></textarea></div>

  <!-- 수입 섹션 -->
  <div style="margin-top:4px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px">💰 수입 정보 (선택)</div>
    <div class="form-row"><label>수입 금액 (원)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="s-income" type="number" min="0" step="1000" placeholder="예: 3000000" oninput="updateSchedIncomePreview()" style="flex:1">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer">
          <input type="checkbox" id="s-no-income" onchange="onSchedNoIncomeChange()" style="accent-color:var(--accent);width:14px;height:14px"> 수입 없음
        </label>
      </div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>수입 성격</label>
        <select id="s-income-type" onchange="updateSchedIncomePreview()">
          <option value="">해당없음</option>
          <option value="3.3">3.3% (프리랜서)</option>
          <option value="9.9">9.9% (사업소득)</option>
          <option value="10">10% (기타소득)</option>
        </select>
      </div>
      <div class="form-row"><label>분배율</label>
        <select id="s-income-ratio" onchange="updateSchedIncomePreview()">
          <option value="100">100% (전액)</option>
          <option value="70">70% (분배)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="s-paid" style="accent-color:var(--accent);width:16px;height:16px">
        <span style="font-size:13px">입금 완료</span>
      </label>
    </div>
    <div id="s-income-preview" style="font-size:12px;color:var(--accent);font-weight:600;margin-top:4px;padding:8px 10px;background:var(--accent-l);border-radius:var(--rxs);display:none"></div>
  </div>

  <div class="modal-foot">
    <button class="btn" onclick="closeModal('m-sched')">취소</button>
    <button class="btn btn-primary" onclick="saveSched()">저장</button>
  </div>
</div>
</div>

<!-- Mission modal -->
<div id="m-miss" class="overlay" style="display:none">
<div class="modal">
  <div class="modal-title" id="m-miss-title">미션 추가</div>
  <div class="form-row"><label>미션명</label><input id="ms-name" placeholder="예: 자료 조사, 초안 작성"></div>
  <div class="form-row"><label>연결 스케줄</label><select id="ms-sched"></select></div>
  <div class="grid2">
    <div class="form-row"><label>목표 완료일</label><input id="ms-date" type="date"></div>
    <div class="form-row"><label>소요기간 (일)</label><input id="ms-days" type="number" min="1" placeholder="필요 일수"></div>
  </div>
  <div class="grid2">
    <div class="form-row"><label>목표 시간 (h)</label><input id="ms-hours" type="number" min="0" step="0.5" placeholder="예: 8">
      <div class="form-hint">입력 시 달성률 자동 계산</div>
    </div>
    <div class="form-row"><label>수동 달성률 (%)</label>
      <div class="prog-input-wrap">
        <input type="range" id="ms-prog-r" min="0" max="100" value="0"
          oninput="document.getElementById('ms-prog-v').value=this.value;document.getElementById('ms-prog-d').textContent=this.value+'%'">
        <input type="number" id="ms-prog-v" min="0" max="100" value="0" style="width:50px"
          oninput="document.getElementById('ms-prog-r').value=this.value;document.getElementById('ms-prog-d').textContent=this.value+'%'">
        <div class="pvd" id="ms-prog-d">0%</div>
      </div>
    </div>
  </div>
  <div class="form-row"><label>메모</label><textarea id="ms-memo" rows="2" placeholder="미션 설명"></textarea></div>
  <div class="modal-foot">
    <button class="btn" onclick="closeModal('m-miss')">취소</button>
    <button class="btn btn-primary" onclick="saveMission()">저장</button>
  </div>
</div>
</div>

<!-- Progress modal -->
<div id="m-prog" class="overlay" style="display:none">
<div class="modal">
  <div class="modal-title" id="m-prog-title">달성률 업데이트</div>
  <input type="hidden" id="prog-type"><input type="hidden" id="prog-id">
  <div class="form-row"><label>달성률</label>
    <div class="prog-input-wrap" style="margin-bottom:8px">
      <input type="range" id="prog-r" min="0" max="100" value="0" oninput="syncProg(this.value)">
      <div class="pvd" id="prog-d">0%</div>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="setP(0)">0%</button>
      <button class="btn btn-sm" onclick="setP(25)">25%</button>
      <button class="btn btn-sm" onclick="setP(50)">50%</button>
      <button class="btn btn-sm" onclick="setP(75)">75%</button>
      <button class="btn btn-sm" onclick="setP(100)">100%</button>
    </div>
  </div>
  <div class="form-row"><label>업무 기록 (선택)</label>
    <textarea id="prog-memo" rows="2" placeholder="오늘 한 일 등"></textarea>
  </div>
  <div class="modal-foot">
    <button class="btn" onclick="closeModal('m-prog')">취소</button>
    <button class="btn btn-primary" onclick="saveProgress()">저장</button>
  </div>
</div>
</div>

<!-- Paper modal -->
<div id="m-paper" class="overlay" style="display:none">
<div class="modal">
  <div class="modal-title" id="m-paper-title">논문 추가</div>
  <div class="form-row"><label>논문 제목</label><input id="p-title" placeholder="논문 제목 전체"></div>
  <div class="grid2">
    <div class="form-row"><label>저자</label><input id="p-author" placeholder="저자명"></div>
    <div class="form-row"><label>저널 / 출처</label><input id="p-journal" placeholder="저널명, 컨퍼런스 등"></div>
  </div>
  <div class="grid2">
    <div class="form-row"><label>발행연도</label><input id="p-year" type="number" min="1900" max="2099" placeholder="2024"></div>
    <div class="form-row"><label>상태</label>
      <select id="p-status">
        <option value="todo">읽을 예정</option>
        <option value="reading">읽는 중</option>
        <option value="done">완독</option>
      </select>
    </div>
  </div>
  <div class="form-row"><label>메모 / 요약</label><textarea id="p-memo" placeholder="핵심 내용, 인상적인 부분 등"></textarea></div>
  <div class="modal-foot">
    <button class="btn btn-del btn-sm" id="p-del-btn" onclick="deletePaper()" style="margin-right:auto;display:none">삭제</button>
    <button class="btn" onclick="closeModal('m-paper')">취소</button>
    <button class="btn btn-primary" onclick="savePaper()">저장</button>
  </div>
</div>
</div>

<!-- Block modal (drag result) -->
<div id="m-block" class="overlay" style="display:none">
<div class="modal">
  <div class="modal-title" id="m-block-title">작업 시간 블록</div>
  <input type="hidden" id="blk-id">

  <!-- date + time row -->
  <div class="grid2" style="margin-bottom:12px">
    <div class="form-row"><label>날짜</label><input id="blk-date" type="date"></div>
    <div style="display:flex;gap:7px;align-items:flex-end">
      <div class="form-row" style="flex:1"><label>시작 시</label><input id="blk-sh" type="number" min="0" max="23"></div>
      <div class="form-row" style="flex:1"><label>종료 시</label><input id="blk-eh" type="number" min="0" max="23"></div>
    </div>
  </div>

  <!-- colour picker: all registered items + free -->
  <div class="color-section-label">어떤 작업인가요?</div>
  <div class="color-grid" id="blk-color-grid"></div>

  <!-- paper sub-select (shown when paper item selected) -->
  <div id="blk-paper-row" style="display:none;margin-top:10px">
    <div class="form-row"><label>논문 선택</label><select id="blk-paper-sel"></select></div>
  </div>



  <!-- title always shown -->
  <div class="form-row" style="margin-top:10px"><label>작업 제목</label><input id="blk-title" placeholder="간단한 작업 내용"></div>
  <div class="form-row"><label>메모</label><textarea id="blk-memo" rows="2" placeholder="특이사항"></textarea></div>
  <div class="form-row"><label>반복</label>
    <select id="blk-repeat">
      <option value="none">반복 없음</option>
      <option value="daily">매일 (7일)</option>
      <option value="weekly">매주 (4주)</option>
      <option value="monthly">매월 (3개월)</option>
    </select>
  </div>

  <!-- 수입 정보 (교육/일정/스케줄에서 표시) -->
  <div id="blk-income-section" style="display:none;margin-top:4px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px">💰 수입 정보 (선택)</div>
    <div class="form-row"><label>수입 금액 (원)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="blk-income" type="number" min="0" step="1000" placeholder="예: 300000" oninput="onIncomeAmtChange()" style="flex:1">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer">
          <input type="checkbox" id="blk-no-income" onchange="onNoIncomeChange()" style="accent-color:var(--accent);width:14px;height:14px"> 수입 없음
        </label>
      </div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>수입 성격</label>
        <select id="blk-income-type" onchange="updateIncomePreview()">
          <option value="">해당없음</option>

const PALETTE={

const SUB_TYPES = [
  {id:'appt',    label:'🤝 약속',    defaultColor:'rose'},
  {id:'meeting', label:'💬 회의',    defaultColor:'sky'},
  {id:'edu',     label:'🎓 교육',    defaultColor:'gold'},

let DB={schedules:[],missions:[],papers:[],blocks:[]};
try{const d=localStorage.getItem('plnr_v6');if(d)DB=JSON.parse(d);}catch(e){}
function save(){try{localStorage.setItem('plnr_v6',JSON.stringify(DB));}catch(e){}}

const today=()=>new Date();
const fmt=d=>d.toISOString().slice(0,10);
const fd=s=>{if(!s)return'';const p=s.split('-');return p[1]+'/'+p[2];};
const pd=s=>{const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);};
const dd=(a,b)=>Math.round((pd(a)-pd(b))/86400000);
const clr=c=>PALETTE[c]||PALETTE.mint;

/* 귀속수입 계산
   3.3%, 9.9% → 수입 × (100 - 세율) / 100 × 분배율 / 100
   10%         → 수입 × 100 / 110 × 분배율 / 100  (부가세 역산)
*/
function calcJina(amt, typ, ratio){
  if(!amt||!typ) return 0;
  const t=parseFloat(typ), r=(ratio||100)/100;
  const net = t===10 ? amt*100/110 : amt*(100-t)/100;
  return Math.round(net*r);
}
function jinaDesc(amt, typ, ratio){
  if(!amt||!typ) return '';
  const t=parseFloat(typ), r=ratio||100;
  if(t===10) return `${amt.toLocaleString()} × 100/110 × ${r}% = ${calcJina(amt,typ,ratio).toLocaleString()}원`;
  return `${amt.toLocaleString()} × ${100-t}% × ${r}% = ${calcJina(amt,typ,ratio).toLocaleString()}원`;
}


/* ═══════════════════════════════════════
   HOURS & PROGRESS
═══════════════════════════════════════ */
function schedHours(sid){return DB.blocks.filter(b=>b.schedId===sid).reduce((a,b)=>a+(b.eh-b.sh),0);}
function missionHours(mid){return DB.blocks.filter(b=>b.missionId===mid).reduce((a,b)=>a+(b.eh-b.sh),0);}
function paperHours(pid){return DB.blocks.filter(b=>b.paperId===pid).reduce((a,b)=>a+(b.eh-b.sh),0);}
function schedProgress(s){return s.targetHours>0?Math.min(100,Math.round(schedHours(s.id)/s.targetHours*100)):s.progress;}
function missionProgress(m){return m.targetHours>0?Math.min(100,Math.round(missionHours(m.id)/m.targetHours*100)):m.progress;}

  renderAll(name);
}

let editSId=null;
function buildColorPicker(containerId,selectedColor,onSelect){
  const el=document.getElementById(containerId);
  el.style.cssText='display:flex;flex-wrap:wrap;gap:8px;margin-top:6px';
  el.innerHTML=Object.entries(PALETTE).map(([k,v])=>`
    <div onclick="selectColor('${containerId}','${k}',${JSON.stringify(onSelect).replace(/"/g,"'")})"
      title="${v.name||k}"
      id="cp-${containerId}-${k}"
      style="position:relative;width:30px;height:30px;border-radius:50%;background:${v.hex};cursor:pointer;
        border:3px solid ${selectedColor===k?'#1a1c24':'transparent'};
        box-shadow:${selectedColor===k?'0 0 0 2px '+v.hex+',0 2px 8px rgba(0,0,0,.18)':'0 1px 3px rgba(0,0,0,.12)'};
        transition:all .15s;flex-shrink:0">
      ${selectedColor===k?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <div style="width:8px;height:8px;border-radius:50%;background:white;opacity:.9"></div></div>`:''}
    </div>`).join('');
}
let _colorPickerCb={};
function selectColor(cid,key,cbName){
  Object.keys(PALETTE).forEach(k=>{
    const el=document.getElementById('cp-'+cid+'-'+k);
    if(el)el.style.borderColor=k===key?'white':'transparent';
  });
  if(cbName&&_colorPickerCb[cbName])_colorPickerCb[cbName](key);
}
let _sColor='mint';
_colorPickerCb['sColorCb']=k=>{_sColor=k;};

function openSchedModal(id){
  editSId=id||null;
  const s=id?DB.schedules.find(x=>x.id===id):null;
  _sColor=s?s.color:'mint';
  document.getElementById('m-sched-title').textContent=s?'프로젝트 수정':'프로젝트 추가';
  document.getElementById('s-name').value=s?s.name:'';
  document.getElementById('s-start').value=s?s.start:fmt(today());
  document.getElementById('s-end').value=s?s.end:fmt(today());
  document.getElementById('s-days').value=s?(s.days||''):'';
  document.getElementById('s-hours').value=s?(s.targetHours||''):'';
  document.getElementById('s-prog').value=s?s.progress:0;
  document.getElementById('s-memo').value=s?s.memo:'';
  document.getElementById('s-income').value=s?(s.noIncome?'':(s.income||'')):'';
  document.getElementById('s-income').disabled=s?!!s.noIncome:false;

  document.getElementById('s-income-ratio').value=s?(s.incomeRatio||100):100;
  document.getElementById('s-paid').checked=s?!!s.paid:false;
  updateSchedIncomePreview();
  buildColorPicker('s-color-picker',_sColor,'sColorCb');
  document.getElementById('m-sched').style.display='flex';
  setTimeout(()=>document.getElementById('s-name').focus(),50);
}
function saveSched(){
  const name=document.getElementById('s-name').value.trim();
  if(!name)return alert('프로젝트명을 입력하세요');
  const start=document.getElementById('s-start').value,end=document.getElementById('s-end').value;
  if(start&&end&&end<start)return alert('마감일이 시작일보다 앞입니다');
  const prev=editSId?DB.schedules.find(x=>x.id===editSId):null;
  const noIncome=document.getElementById('s-no-income').checked;
  const incomeAmt=noIncome?0:parseFloat(document.getElementById('s-income').value)||0;
  const incomeType=document.getElementById('s-income-type').value;
  const incomeRatio=parseInt(document.getElementById('s-income-ratio').value)||100;
  const jinaIncome=calcJina(incomeAmt,incomeType,incomeRatio);
  const newDays=parseInt(document.getElementById('s-days').value)||0;
  const newHours=parseFloat(document.getElementById('s-hours').value)||0;

  // 마감일 변경 시 달성률 재계산
  let newProgress=Math.min(100,Math.max(0,parseInt(document.getElementById('s-prog').value)||0));
  if(prev&&end&&prev.end&&end!==prev.end&&prev.targetHours>0){
    // targetHours 기반이면 시간 기반이라 그대로
    newProgress=prev.progress;
  } else if(prev&&end&&prev.end&&end!==prev.end&&newDays>0&&prev.days>0){
    // 소요기간 기반: 경과 비율 재계산
    const ts=fmt(today());
    if(start&&end){
      const span=Math.max(1,dd(end,start));
      const elapsed=Math.max(0,dd(ts,start));
      const expectedNew=Math.min(100,Math.round(elapsed/span*100));
      // 진행률은 그대로 유지, 기대치만 바뀜
      newProgress=prev.progress;
    }
  }

  const obj={id:editSId||Date.now(),name,start,end,
    days:newDays,
    targetHours:newHours,
    color:_sColor,
    progress:newProgress,
    memo:document.getElementById('s-memo').value,
    income:incomeAmt,incomeType,incomeRatio,jinaIncome,
    noIncome,paid:document.getElementById('s-paid').checked,
    logs:prev?prev.logs:[]};

  if(editSId){
    DB.schedules=DB.schedules.map(x=>x.id===editSId?obj:x);
    // 마감일 변경 시 연결된 미션도 알림
    if(prev&&end&&prev.end&&end!==prev.end){
      const overMissions=DB.missions.filter(m=>m.schedId===editSId&&m.date>end);
      if(overMissions.length){
        setTimeout(()=>alert(`마감일이 변경됐어요.
새 마감일(${fd(end)}) 이후로 설정된 미션 ${overMissions.length}개를 확인하세요.`),100);
      }
    }
  } else {
    DB.schedules.push(obj);
  }
  save();closeModal('m-sched');renderAll();
}

function updateSchedIncomePreview(){
  const amt=parseFloat(document.getElementById('s-income').value)||0;
  const typ=document.getElementById('s-income-type').value;
  const ratio=parseInt(document.getElementById('s-income-ratio').value)||100;
  const prev=document.getElementById('s-income-preview');
  if(!prev)return;
  if(amt&&typ){
    const jina=calcJina(amt,typ,ratio);
    prev.style.display='';
    prev.textContent=`진아 귀속수입: ${jina.toLocaleString()}원 (${jinaDesc(amt,typ,ratio)})`;
  } else {
    prev.style.display='none';
  }
}

function saveProgress(){
  const type=document.getElementById('prog-type').value;
  const id=parseInt(document.getElementById('prog-id').value);
  const val=parseInt(document.getElementById('prog-r').value);
  const memo=document.getElementById('prog-memo').value.trim();
  const arr=type==='sched'?DB.schedules:DB.missions;
  const item=arr.find(x=>x.id===id);if(!item)return;
  item.progress=val;
  if(!item.logs)item.logs=[];
  item.logs.unshift({date:fmt(today()),memo:memo||`달성률 ${val}%로 업데이트`,progress:val});
  if(item.logs.length>30)item.logs=item.logs.slice(0,30);
  save();closeModal('m-prog');renderAll();
}

function buildBlockColorGrid(blk){
  const grid=document.getElementById('blk-color-grid');
  let html='';

  // schedules
  DB.schedules.filter(s=>schedProgress(s)<100).forEach(s=>{
    const c=clr(s.color);
    const sel=_blkSelected.type==='sched'&&_blkSelected.id===s.id;
    html+=`<div class="color-group ${sel?'selected':''}" id="cg-sched-${s.id}" onclick="selectBlkItem('sched',${s.id},'${s.color}')">
      <div class="color-swatch" style="background:${c.hex}"></div>
      <div class="color-group-info">
        <div class="color-group-name">${s.name}</div>
        <div class="color-group-sub">프로젝트 · ${fd(s.start)} → ${fd(s.end)}</div>
      </div>
    </div>`;
  });

  // missions (active)
  DB.missions.filter(m=>missionProgress(m)<100).forEach(m=>{
    const sched=DB.schedules.find(s=>s.id===m.schedId);
    const c=clr(sched?sched.color:'mint');
    const sel=_blkSelected.type==='mission'&&_blkSelected.id===m.id;
    html+=`<div class="color-group ${sel?'selected':''}" id="cg-mission-${m.id}" onclick="selectBlkItem('mission',${m.id},'${sched?sched.color:'mint'}')">
      <div class="color-swatch" style="background:${c.hex};opacity:.7"></div>
      <div class="color-group-info">
        <div class="color-group-name">${m.name}</div>
        <div class="color-group-sub">미션${sched?' · '+sched.name:''} · ${fd(m.date)}</div>
      </div>
    </div>`;
  });

  // papers
  DB.papers.forEach(p=>{
    const sel=_blkSelected.type==='paper'&&_blkSelected.id===p.id;
    html+=`<div class="color-group ${sel?'selected':''}" id="cg-paper-${p.id}" onclick="selectBlkItem('paper',${p.id},'purple')">
      <div class="color-swatch" style="background:#9080f0"></div>
      <div class="color-group-info">
        <div class="color-group-name">📄 ${p.title.length>30?p.title.slice(0,30)+'…':p.title}</div>
        <div class="color-group-sub">논문 읽기${p.author?' · '+p.author:''}</div>
      </div>
    </div>`;
  });

  // free: 약속 (pink) / 일정 (cyan)

  // 단발성 세부 유형들
  SUB_TYPES.forEach(t=>{
    const sel=_blkSelected.type===t.id;
    const defC=PALETTE[_blkSelected.type===t.id?(_blkSelected.color||t.defaultColor):t.defaultColor]||PALETTE.mint;
    html+=`<div class="color-group ${sel?'selected':''}" id="cg-${t.id}" onclick="selectBlkItem('${t.id}',null,'${t.defaultColor}')">
      <div class="color-swatch" style="background:${defC.hex}"></div>
      <div class="color-group-info"><div class="color-group-name">${t.label}</div></div>
    </div>`;
  });

  grid.innerHTML=html;

  // appt/event have fixed colors — no picker needed

  updateBlkSubRows();
}

function selectBlkItem(type,id,color){
  _blkSelected={type,id:id?parseInt(id):null,color};
  // update selection UI
  document.querySelectorAll('.color-group').forEach(el=>el.classList.remove('selected'));
  // SUB_TYPES 체크 (appt/meeting/edu/project/study) → id에 숫자 없음
  const isSubType = !!SUB_TYPE_MAP[type];
  const key = isSubType ? `cg-${type}` : (id ? `cg-${type}-${id}` : `cg-${type}`);
  const el=document.getElementById(key);
  if(el)el.classList.add('selected');
  updateBlkSubRows();
  // auto-fill title from schedule/mission name if blank
  const titleEl=document.getElementById('blk-title');
  if(!titleEl.value){
    if(type==='sched'){const s=DB.schedules.find(x=>x.id===parseInt(id));if(s)titleEl.value=s.name;}
    else if(type==='mission'){const m=DB.missions.find(x=>x.id===parseInt(id));if(m)titleEl.value=m.name;}
    else if(type==='paper'){const p=DB.papers.find(x=>x.id===parseInt(id));if(p)titleEl.value='논문 읽기: '+p.title.slice(0,20);}
  }
}

function saveBlock(){
  const sh=parseInt(document.getElementById('blk-sh').value);
  const eh=parseInt(document.getElementById('blk-eh').value);
  if(isNaN(sh)||isNaN(eh)||eh<=sh)return alert('종료 시간이 시작 시간보다 커야 합니다');
  if(!_blkSelected.type)return alert('작업 유형을 선택하세요');
  const title=document.getElementById('blk-title').value.trim();
  if(!title)return alert('작업 제목을 입력하세요');
  const type=_blkSelected.type;
  const schedId=type==='sched'?_blkSelected.id:type==='mission'?(DB.missions.find(m=>m.id===_blkSelected.id)||{}).schedId:null;
  const missionId=type==='mission'?_blkSelected.id:null;
  let paperId=null;
  if(type==='paper'){
    paperId=parseInt(document.getElementById('blk-paper-sel').value)||_blkSelected.id;
    // update paper status to reading if todo
    const p=DB.papers.find(x=>x.id===paperId);
    if(p&&p.status==='todo')p.status='reading';
  }
  const subT=SUB_TYPE_MAP[type];
  const color=subT?(_blkSelected.color||subT.defaultColor):(type==='paper'?'purple':
    (DB.schedules.find(s=>s.id===schedId)||{}).color||'mint');
  const repeatVal=document.getElementById('blk-repeat').value||'none';
  const id=document.getElementById('blk-id').value;
  const noIncome=document.getElementById('blk-no-income').checked;
  const incomeAmt=noIncome?0:parseFloat(document.getElementById('blk-income').value)||0;
  const incomeType=document.getElementById('blk-income-type').value;
  const incomeRatio=parseInt(document.getElementById('blk-income-ratio').value)||100;
  // 진아 귀속수입 = 수입*(100-수입성격%)/100*분배율/100
  const jinaIncome=calcJina(incomeAmt,incomeType,incomeRatio);
  const obj={id:id?parseInt(id):Date.now(),type,schedId,missionId,paperId,color,
    date:document.getElementById('blk-date').value,sh,eh,title,
    memo:document.getElementById('blk-memo').value,
    income:incomeAmt,incomeType,incomeRatio,jinaIncome,noIncome,paid:document.getElementById('blk-paid').checked};
  if(id){
    DB.blocks=DB.blocks.map(b=>b.id===parseInt(id)?{...obj,repeat:repeatVal}:b);
  } else {
    const repeatDates=getRepeatDates(obj.date,repeatVal);
    repeatDates.forEach((d,i)=>{
      DB.blocks.push({...obj,id:Date.now()+i,date:d,repeat:repeatVal});
    });
  }
  save();closeModal('m-block');renderAll();
}

function getRepeatDates(startDate, repeat){
  if(!repeat||repeat==='none') return [startDate];
  const dates=[startDate];
  const base=pd(startDate);
  const count={daily:6,weekly:3,monthly:2}[repeat]||0;
  for(let i=1;i<=count;i++){
    const d=new Date(base);
    if(repeat==='daily') d.setDate(base.getDate()+i);
    else if(repeat==='weekly') d.setDate(base.getDate()+i*7);
    else if(repeat==='monthly') d.setMonth(base.getMonth()+i);
    dates.push(fmt(d));
  }
  return dates;
}


function confirmDeleteBlock(id){
  const blk=DB.blocks.find(b=>b.id===id);
  if(!blk)return;
  // 같은 반복 그룹 찾기 (날짜 정렬)
  const sameRepeat=blk.repeat&&blk.repeat!=='none'
    ? DB.blocks.filter(b=>
        b.title===blk.title&&b.type===blk.type&&
        b.repeat===blk.repeat&&b.schedId===blk.schedId&&
        b.sh===blk.sh&&b.eh===blk.eh
      ).sort((a,b)=>a.date>b.date?1:-1)
    : [];
  const futureCount=sameRepeat.filter(b=>b.date>=blk.date).length;

  if(sameRepeat.length>1){
    // 3가지 선택지를 두 번의 confirm으로 구현
    // 1차: 이 날만 vs 이후 전체
    const thisOnly=window.confirm(
      `반복 일정 "${blk.title}"

` +
      `확인 → 이 날(${blk.date})만 삭제
` +
      `취소 → 이 날 포함 이후 ${futureCount}개 삭제`
    );
    if(thisOnly){
      // 이 날만 삭제
      DB.blocks=DB.blocks.filter(b=>b.id!==id);
    } else {
      // 이 날 포함 이후 삭제
      if(!window.confirm(`${blk.date} 이후 반복 일정 ${futureCount}개를 삭제할까요?`))return;
      DB.blocks=DB.blocks.filter(b=>
        !(b.title===blk.title&&b.type===blk.type&&
          b.repeat===blk.repeat&&b.schedId===blk.schedId&&
          b.sh===blk.sh&&b.eh===blk.eh&&b.date>=blk.date)
      );
    }
  } else {
    if(!window.confirm(`"${blk.title}" 블록을 삭제할까요?`))return;
    DB.blocks=DB.blocks.filter(b=>b.id!==id);
  }
  save();renderAll();
}

/* ═══════════════════════════════════════
   URGENCY
═══════════════════════════════════════ */
function urgency(item,isDate,prog){
  // 날짜 미정 처리
  if(!isDate&&(!item.start||!item.end)){
    const p=prog??item.progress;
    if(p>=100)return{level:'done',msg:'완료 🎉',exp:100};
    return{level:'ok',msg:'📌 일정 미정 — 날짜를 설정하면 추적 시작',exp:0};
  }
  const ts=fmt(today());
  const end=isDate?item.date:item.end,start=isDate?item.date:item.start;
  const p=prog??item.progress;
  if(p>=100)return{level:'done',msg:'완료 🎉',exp:100};
  const span=Math.max(1,dd(end,start));
  const elapsed=Math.max(0,dd(ts,start));
  const remain=dd(end,ts);
  const exp=Math.min(100,Math.round(elapsed/span*100));
  const gap=exp-p,d=item.days||0;
  if(remain<0)return{level:'crit',msg:`⚠ 마감 ${Math.abs(remain)}일 초과!`,exp,gap};
  if(d>0&&remain<=Math.ceil(d*.25))return{level:'crit',msg:`🚨 소요 ${d}일 기준 남은 ${remain}일 — 지금 바로!`,exp,gap};
  if(d>0&&remain<=Math.ceil(d*.55))return{level:'high',msg:`⚡ 소요 ${d}일 기준 ${remain}일 남음`,exp,gap};
  if(gap>=30)return{level:'crit',msg:`🚨 진도 ${gap}%p 뒤처짐`,exp,gap};
  if(gap>=15)return{level:'high',msg:`⚡ 진도 ${gap}%p 뒤처짐`,exp,gap};
  if(remain<=3&&remain>=0)return{level:'high',msg:`⚡ ${remain===0?'오늘 마감':remain+'일 후 마감'}`,exp,gap};
  return{level:'ok',msg:`✅ 순항 중 — ${remain}일 남음`,exp,gap};
}
function buildAlerts(){
  const al=[];
  DB.schedules.filter(s=>schedProgress(s)<100).forEach(s=>{
    const u=urgency(s,false,schedProgress(s));
    if(u.level==='crit')al.push({type:'danger',msg:`<b>${s.name}</b> — ${u.msg}`});
    else if(u.level==='high')al.push({type:'warn',msg:`<b>${s.name}</b> — ${u.msg}`});
  });
  DB.missions.filter(m=>missionProgress(m)<100).forEach(m=>{
    const sc=DB.schedules.find(x=>x.id===m.schedId);
    const remain=dd(m.date,fmt(today()));
    if(remain<0)al.push({type:'danger',msg:`미션 <b>${m.name}</b>${sc?' ('+sc.name+')':''} — ${Math.abs(remain)}일 지연`});
    else if(m.days>0&&remain<=Math.ceil(m.days*.35))al.push({type:'warn',msg:`미션 <b>${m.name}</b> — ${remain}일 남음`});
    else if(remain>=0&&remain<=2)al.push({type:'warn',msg:`미션 <b>${m.name}</b> — ${remain===0?'오늘 마감':remain+'일 후 마감'}`});
  });
  return al;
}

/* ═══════════════════════════════════════
   WEEKLY GRID + DRAG
═══════════════════════════════════════ */
const CELL_H=52,START_H=7,END_H=23,ROWS=END_H-START_H;
let drag={active:false,colIdx:null,startRow:null,curRow:null,ghost:null,date:null};

function weekDates(off){
  const d=today();d.setDate(d.getDate()-d.getDay()+off*7);d.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});
}
function changeWeek(d){weekOff+=d;renderWeekly();}

function renderWeekly(){
  const dates=weekDates(weekOff),ts=fmt(today());
  const ws=dates[0],we=dates[6];
  document.getElementById('week-range').textContent=
    `${ws.getMonth()+1}/${ws.getDate()} — ${we.getMonth()+1}/${we.getDate()}`
    +(weekOff===0?' (이번 주)':weekOff>0?` +${weekOff}주`:` ${weekOff}주`);

  const grid=document.getElementById('week-grid');
  let h=`<div class="gh" style="font-size:10px;color:var(--text3)">시간</div>`;
  dates.forEach(d=>{
    const ds=fmt(d),it=ds===ts;
    h+=`<div class="gh ${it?'today':''}"><span style="font-size:11px">${DAYS[d.getDay()]}</span><br><span class="gday ${it?'tn':''}">${d.getDate()}</span></div>`;
  });
  for(let r=0;r<ROWS;r++){
    const hr=START_H+r;
    h+=`<div class="gt">${hr}</div>`;
    dates.forEach((d,ci)=>{
      const ds=fmt(d);
      h+=`<div class="gc" data-col="${ci}" data-row="${r}"
        onmousedown="onCellDown(event,${ci},'${ds}',${r})"
        onmousemove="onCellMove(event,${r})"
        onmouseup="onCellUp(event,${r})"></div>`;
    });
  }
  grid.innerHTML=h;

  // render existing blocks
  const w0=fmt(dates[0]),w6=fmt(dates[6]);
  DB.blocks.filter(b=>b.date>=w0&&b.date<=w6&&(!filterColor||b.color===filterColor)).forEach(b=>placeBlock(b,dates));
  grid.onmouseleave=()=>{if(drag.active)finishDrag();};
}

function placeBlock(b,dates){
  const grid=document.getElementById('week-grid');
  const ci=dates.findIndex(d=>fmt(d)===b.date);
  if(ci<0)return;
  const startRow=Math.max(0,b.sh-START_H);
  const endRow=Math.min(ROWS,b.eh-START_H);
  if(endRow<=startRow)return;
  const refCells=grid.querySelectorAll(`.gc[data-col="${ci}"]`);
  const refCell=refCells[startRow];
  if(!refCell)return;
  const c=PALETTE[b.color]||PALETTE.mint;
  const el=document.createElement('div');
  el.className='tblock';
  el.id='blk-'+b.id;
  el.style.cssText=`top:${refCell.offsetTop}px;left:${refCell.offsetLeft+2}px;width:${refCell.offsetWidth-4}px;height:${(endRow-startRow)*CELL_H-3}px;background:${c.bg};border-color:${c.border};color:${c.text}`;
  el.innerHTML=`<div class="tb-title">${b.title}</div><div class="tb-time">${b.sh}:00–${b.eh}:00 (${b.eh-b.sh}h)</div>`;
  el.onclick=()=>openBlockModal(null,null,null,b.id);
  el.oncontextmenu=(e)=>{e.preventDefault();confirmDeleteBlock(b.id);};
  grid.appendChild(el);
}

function onCellDown(e,ci,date,row){
  if(e.button!==0)return;
  e.preventDefault();
  drag={active:true,colIdx:ci,startRow:row,curRow:row,ghost:null,date};
  const g=document.createElement('div');
  g.className='drag-ghost';
  document.getElementById('week-grid').appendChild(g);
  drag.ghost=g;
  updateGhost();
}
function onCellMove(e,row){if(!drag.active||row===drag.curRow)return;drag.curRow=row;updateGhost();}
function onCellUp(e,row){if(!drag.active)return;drag.curRow=row;finishDrag();}
function updateGhost(){
  if(!drag.ghost)return;
  const grid=document.getElementById('week-grid');
  const minR=Math.min(drag.startRow,drag.curRow),maxR=Math.max(drag.startRow,drag.curRow)+1;
  const ref=grid.querySelectorAll(`.gc[data-col="${drag.colIdx}"]`)[minR];
  if(!ref){drag.ghost.style.display='none';return;}
  drag.ghost.style.cssText=`top:${ref.offsetTop}px;left:${ref.offsetLeft+2}px;width:${ref.offsetWidth-4}px;height:${(maxR-minR)*CELL_H-2}px`;
}
function finishDrag(){
  if(!drag.active)return;
  const minR=Math.min(drag.startRow,drag.curRow),maxR=Math.max(drag.startRow,drag.curRow)+1;
  drag.ghost&&drag.ghost.remove();
  drag.active=false;
  handleDragResult(drag.date,START_H+minR,START_H+maxR);
}


/* ═══════════════════════════════════════
   DAILY VIEW
═══════════════════════════════════════ */
const DCELL_H=60, DSTART_H=7, DEND_H=23, DROWS=DEND_H-DSTART_H;
let dayOff=0;
let ddrag={active:false,startRow:null,curRow:null,ghost:null,date:null};

function getDay(off){
  const d=today();d.setDate(d.getDate()+off);d.setHours(0,0,0,0);return d;
}
function changeDay(d){dayOff+=d;renderDaily();}

function renderDaily(){
  const d=getDay(dayOff);
  const ds=fmt(d);
  const ts=fmt(today());
  const wd=['일','월','화','수','목','금','토'];
  document.getElementById('daily-title').textContent=
    `${d.getMonth()+1}/${d.getDate()} (${wd[d.getDay()]})`
    +(dayOff===0?' · 오늘':'');

  const grid=document.getElementById('day-grid');
  // header
  let h=`<div class="dh-row">
    <div class="dh-time"></div>
    <div class="dh-day">
      <span class="dh-day-num">${d.getDate()}</span>
      <div><div style="font-size:13px;font-weight:700">${wd[d.getDay()]}요일</div>
      <div class="dh-day-sub">${d.getFullYear()}년 ${d.getMonth()+1}월</div></div>
    </div>
  </div>`;

  for(let r=0;r<DROWS;r++){
    const hr=DSTART_H+r;
    h+=`<div class="dt">${hr}</div>`;
    h+=`<div class="dc" data-row="${r}"
      onmousedown="onDCellDown(event,'${ds}',${r})"
      onmousemove="onDCellMove(event,${r})"
      onmouseup="onDCellUp(event,${r})"></div>`;
  }
  grid.innerHTML=h;

  // place blocks for this day
  const dayBlocks=DB.blocks.filter(b=>b.date===ds&&(!filterColor||b.color===filterColor));
  dayBlocks.forEach(b=>placeDayBlock(b));

  // now-line
  if(ds===ts){
    const now=new Date();
    const mins=(now.getHours()-DSTART_H)*60+now.getMinutes();
    if(mins>=0&&mins<DROWS*60){
      const pct=(mins%(60))/60*100;
      const row=Math.floor(mins/60);
      const cells=grid.querySelectorAll('.dc');
      if(cells[row]){
        cells[row].classList.add('now-line');
        cells[row].style.setProperty('--now-top', pct+'%');
      }
    }
  }

  grid.onmouseleave=()=>{if(ddrag.active)finishDDrag();};

  // right panel
  renderDailyPanel(ds);
}

function placeDayBlock(b){
  const grid=document.getElementById('day-grid');
  const startRow=Math.max(0,b.sh-DSTART_H);
  const endRow=Math.min(DROWS,b.eh-DSTART_H);
  if(endRow<=startRow)return;
  const cells=grid.querySelectorAll('.dc');
  const refCell=cells[startRow];
  if(!refCell)return;
  const c=PALETTE[b.color]||PALETTE.mint;
  const el=document.createElement('div');
  el.className='tblock';
  el.id='dblk-'+b.id;
  el.style.cssText=`top:${refCell.offsetTop}px;left:${refCell.offsetLeft+2}px;width:${refCell.offsetWidth-4}px;height:${(endRow-startRow)*DCELL_H-3}px;background:${c.bg};border-color:${c.border};color:${c.text}`;
  el.innerHTML=`<div class="tb-title">${b.title}</div><div class="tb-time">${b.sh}:00–${b.eh}:00 (${b.eh-b.sh}h)</div>`;
  el.onclick=()=>openBlockModal(null,null,null,b.id);
  el.oncontextmenu=(e)=>{e.preventDefault();confirmDeleteBlock(b.id);};
  grid.appendChild(el);
}

/* daily drag */
function onDCellDown(e,date,row){
  if(e.button!==0)return;
  e.preventDefault();
  ddrag={active:true,startRow:row,curRow:row,ghost:null,date};
  const g=document.createElement('div');
  g.className='drag-ghost';
  document.getElementById('day-grid').appendChild(g);
  ddrag.ghost=g;
  updateDGhost();
}
function onDCellMove(e,row){if(!ddrag.active||row===ddrag.curRow)return;ddrag.curRow=row;updateDGhost();}
function onDCellUp(e,row){if(!ddrag.active)return;ddrag.curRow=row;finishDDrag();}
function updateDGhost(){
  if(!ddrag.ghost)return;
  const grid=document.getElementById('day-grid');
  const minR=Math.min(ddrag.startRow,ddrag.curRow),maxR=Math.max(ddrag.startRow,ddrag.curRow)+1;
  const ref=grid.querySelectorAll('.dc')[minR];
  if(!ref){ddrag.ghost.style.display='none';return;}
  ddrag.ghost.style.cssText=`top:${ref.offsetTop}px;left:${ref.offsetLeft+2}px;width:${ref.offsetWidth-4}px;height:${(maxR-minR)*DCELL_H-2}px`;
}
function finishDDrag(){
  if(!ddrag.active)return;
  const minR=Math.min(ddrag.startRow,ddrag.curRow),maxR=Math.max(ddrag.startRow,ddrag.curRow)+1;
  ddrag.ghost&&ddrag.ghost.remove();
  ddrag.active=false;
  handleDragResult(ddrag.date,DSTART_H+minR,DSTART_H+maxR);
}

/* right-side panel: today's schedules + blocks summary */
function renderDailyPanel(ds){
  const panel=document.getElementById('daily-right');
  // active schedules today
  const activeSch=DB.schedules.filter(s=>schedProgress(s)<100&&s.start<=ds&&s.end>=ds);
  // missions due today or within 3 days
  const ts=fmt(today());
  const nearMissions=DB.missions.filter(m=>missionProgress(m)<100&&dd(m.date,ds)<=3&&dd(m.date,ds)>=0);
  // blocks today
  const todayBlocks=DB.blocks.filter(b=>b.date===ds&&(!filterColor||b.color===filterColor));
  const totalH=todayBlocks.reduce((a,b)=>a+(b.eh-b.sh),0);

  let html='';

  // today hours summary
  html+=`<div class="dpanel">
    <div class="dpanel-title">오늘 작업 시간</div>
    <div class="day-hour-total">${totalH}h 기록됨</div>
    ${todayBlocks.length?todayBlocks.map(b=>{
      const c=PALETTE[b.color]||PALETTE.mint;
      return`<div class="dpanel-item"><div class="dpanel-dot" style="background:${c.hex}"></div>
        <div><div style="font-weight:600">${b.title}</div>
        <div style="color:var(--text2);font-size:11px;font-family:'DM Mono',monospace">${b.sh}:00–${b.eh}:00</div></div></div>`;
    }).join(''):'<div style="font-size:12px;color:var(--text3)">블록 없음<br>아래 드래그로 추가</div>'}
  </div>`;

  // active schedules
  if(activeSch.length){
    html+=`<div class="dpanel">
      <div class="dpanel-title">오늘 진행 중 프로젝트</div>
      ${activeSch.map(s=>{
        const prog=schedProgress(s);
        const c=PALETTE[s.color]||PALETTE.mint;
        return`<div class="dpanel-item"><div class="dpanel-dot" style="background:${c.hex}"></div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
            <div style="color:var(--text2);font-size:11px">${prog}% 달성 · ${dd(s.end,ds)}일 남음</div>
          </div></div>`;
      }).join('')}
      <button class="dpanel-add" onclick="openBlockModal('${ds}',9,10,null)">+ 이 날 블록 추가</button>
    </div>`;
  }

  // near missions
  if(nearMissions.length){
    html+=`<div class="dpanel">
      <div class="dpanel-title">임박한 미션</div>
      ${nearMissions.map(m=>{
        const sc=DB.schedules.find(x=>x.id===m.schedId);
        const remain=dd(m.date,ds);
        return`<div class="dpanel-item">
          <div class="dpanel-dot" style="background:${remain===0?'var(--danger)':'var(--warn)'}"></div>
          <div><div style="font-weight:600">${m.name}</div>
          <div style="color:var(--text2);font-size:11px">${remain===0?'오늘 마감':remain+'일 후'}${sc?' · '+sc.name:''}</div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  if(!html) html='<div class="dpanel" style="color:var(--text3);font-size:12px;text-align:center;padding:20px">일정 없음</div>';
  panel.innerHTML=html;
}

function pbar(pct,exp){
  const fc=pct>=100?'var(--accent)':pct>=exp?'var(--accent)':pct>=exp-20?'var(--warn)':'var(--danger)';
  return`<div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,pct)}%;background:${fc}"></div>${exp>0?`<div class="prog-exp" style="left:${Math.min(98,exp)}%"></div>`:''}</div>`;
}
function renderSchedules(){
  const ts=fmt(today());
  const active=DB.schedules.filter(s=>schedProgress(s)<100);
  if(!active.length){document.getElementById('sched-list').innerHTML=`<div class="empty"><div class="empty-icon">🗂</div><p>진행 중인 프로젝트가 없어요.</p></div>`;return;}
  document.getElementById('sched-list').innerHTML=[...active].sort((a,b)=>a.start>b.start?1:-1).map(s=>{
    const prog=schedProgress(s),u=urgency(s,false,prog);
    const urgCls={crit:'urg-crit',high:'urg-high',ok:'urg-ok',done:'urg-done'}[u.level];
    const missions=DB.missions.filter(m=>m.schedId===s.id&&missionProgress(m)<100);
    const mdoneTotal=DB.missions.filter(m=>m.schedId===s.id&&missionProgress(m)>=100).length;

    const isOpen=!collapsed[s.id];
    const span=dd(s.end,s.start)+1,remain=dd(s.end,ts),logH=schedHours(s.id);
    const c=clr(s.color);
    const badge=s.end<ts?'<span class="badge b-orange">기간종료</span>':s.start<=ts&&s.end>=ts?'<span class="badge b-blue">진행중</span>':'<span class="badge b-gray">예정</span>';
    return`<div class="sched-card">
      <div class="sched-head" onclick="toggleCollapse(${s.id})">
        <div class="sched-accent" style="background:${c.hex};min-height:26px"></div>
        <div class="sched-title-row">
          <div class="sched-name">${s.name}${badge}<span class="caret ${isOpen?'open':''}">▶</span></div>
          <div class="sched-meta">
            <span>📅 ${s.start?fd(s.start):"미정"} → ${s.end?fd(s.end):"미정"}</span>
            ${s.days?`<span>⏱ 소요 ${s.days}일</span>`:''}
            <span>📆 ${span}일 · 남은 ${remain<0?0:remain}일</span>
            ${s.targetHours?`<span>🕐 ${logH}/${s.targetHours}h</span>`:''}

          </div>
        </div>
        <div class="sched-actions" onclick="event.stopPropagation()">

          <button class="btn btn-sm" onclick="openMissionModal(${s.id})">+ 미션</button>
          <button class="btn btn-sm" onclick="openSchedModal(${s.id})">수정</button>
          <button class="btn btn-sm btn-del" onclick="deleteSched(${s.id})">삭제</button>
        </div>
      </div>
      ${isOpen?`<div class="sched-body">
        <div class="urg ${urgCls}">${u.msg}</div>
        <div class="prog-wrap">
          <div class="prog-row"><span style="color:var(--text2)">달성률${s.targetHours?' ('+logH+'h/'+s.targetHours+'h)':''}</span>
            <span class="prog-pct" style="color:${prog>=u.exp?'var(--accent)':prog>0?'var(--warn)':'var(--danger)'}">${prog}%<span style="font-size:10px;color:var(--text3)"> 기대${u.exp}%</span></span>
          </div>${pbar(prog,u.exp)}
        </div>
        ${s.memo?`<div style="background:var(--bg3);border-radius:5px;padding:8px 11px;font-size:12px;color:var(--text2);margin-bottom:11px">${s.memo}</div>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">

        <div class="missions">${missions.length?missions.map(m=>{

          return`<div class="mrow">
            <div class="minfo"><div class="mname">${m.name}${mbadge}</div>

        </div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

   INCOME VIEW

function renderIncome(){
  // 수입 정보 있는 블록 (noIncome=true도 포함해서 표시)
  // 블록 수입 + 프로젝트(스케줄) 직접 수입 합산
  const schedIncItems=DB.schedules.filter(s=>s.income>0||s.noIncome).map(s=>({
    ...s, date:s.start||fmt(today()), title:s.name,
    type:'project-direct', color:s.color||'mint',
    isSchedIncome:true
  }));
  const allIncBlocks=[...DB.blocks.filter(b=>b.income>0||b.noIncome),...schedIncItems];
  const incBlocks=allIncBlocks.filter(b=>b.income>0);
  const totalIncome=incBlocks.reduce((a,b)=>a+(b.income||0),0);
  const totalJina=incBlocks.reduce((a,b)=>a+(b.jinaIncome||0),0);
  const totalTax=totalIncome-totalJina;
  const unpaid=incBlocks.filter(b=>b.type==='project'&&!b.paid).reduce((a,b)=>a+(b.income||0),0);

  const list=document.getElementById('income-list');
  if(!list)return;

  // ── 상단 통계 카드 (항상 표시) ──
  let html=`<div class="income-summary-bar">
    <div class="income-stat"><div class="income-stat-num" style="color:var(--info)">${totalIncome.toLocaleString()}원</div><div class="income-stat-lbl">총 수입</div></div>
    <div class="income-stat"><div class="income-stat-num" style="color:var(--accent)">${totalJina.toLocaleString()}원</div><div class="income-stat-lbl">진아 귀속수입 합계</div></div>
    <div class="income-stat"><div class="income-stat-num" style="color:${unpaid?'var(--danger)':'var(--text2)'}">${unpaid.toLocaleString()}원</div><div class="income-stat-lbl">미입금 (프로젝트)</div></div>
  </div>`;

  // ── 월별 귀속수입 누적 합산 바 ──
  const byMonthAll={};
  allIncBlocks.sort((a,b)=>a.date>b.date?1:-1).forEach(b=>{
    const m=b.date.slice(0,7);
    if(!byMonthAll[m])byMonthAll[m]=[];
    byMonthAll[m].push(b);
  });
  const months=Object.keys(byMonthAll).sort();

  if(months.length){
    let cumJina=0;
    html+=`<div class="income-card" style="margin-bottom:14px">
      <div class="income-head"><div style="font-size:14px;font-weight:700">📊 월별 귀속수입 누적</div></div>
      <div class="income-body">
        <table class="income-table">
          <thead><tr><th>월</th><th>수입</th><th>귀속수입</th><th>누적 귀속수입</th></tr></thead>
          <tbody>`;
    months.forEach(m=>{
      const blocks=byMonthAll[m];
      const mInc=blocks.filter(b=>!b.noIncome).reduce((a,b)=>a+(b.income||0),0);
      const mJina=blocks.filter(b=>!b.noIncome).reduce((a,b)=>a+(b.jinaIncome||0),0);
      cumJina+=mJina;
      const [y,mo]=m.split('-');
      html+=`<tr>
        <td style="font-weight:600">${y}/${parseInt(mo)}월</td>
        <td style="font-family:'DM Mono',monospace">${mInc.toLocaleString()}</td>
        <td style="color:var(--accent);font-weight:600;font-family:'DM Mono',monospace">${mJina.toLocaleString()}</td>
        <td style="color:var(--accent-d);font-weight:700;font-family:'DM Mono',monospace">${cumJina.toLocaleString()}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  // ── 데이터 없을 때 빈 테이블 포맷 ──
  if(!allIncBlocks.length){
    html+=`<div class="income-card">
      <div class="income-head"><div style="font-size:14px;font-weight:700;color:var(--text2)">수입 내역</div></div>
      <div class="income-body">
        <table class="income-table">
          <thead><tr><th>날짜</th><th>항목</th><th>유형</th><th>수입</th><th>성격</th><th>분배율</th><th>진아 귀속수입</th><th>입금</th></tr></thead>
          <tbody><tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">아직 수입 기록이 없어요</td></tr></tbody>
        </table>
      </div>
    </div>`;
    list.innerHTML=html;
    return;
  }

  // ── 월별 상세 내역 ──
  months.slice().reverse().forEach(month=>{
    const blocks=byMonthAll[month];
    const mTotal=blocks.filter(b=>!b.noIncome).reduce((a,b)=>a+(b.income||0),0);
    const mJina=blocks.filter(b=>!b.noIncome).reduce((a,b)=>a+(b.jinaIncome||0),0);
    const [y,mo]=month.split('-');
    html+=`<div class="income-card">
      <div class="income-head">
        <div style="font-size:14px;font-weight:700;flex:1">${y}년 ${parseInt(mo)}월</div>
        <div style="font-size:12px;color:var(--text2)">${mTotal.toLocaleString()}원 → 귀속 <span style="color:var(--accent);font-weight:700">${mJina.toLocaleString()}원</span></div>
      </div>
      <div class="income-body">
        <table class="income-table">
          <thead><tr>
            <th>날짜</th><th>항목</th><th>유형</th><th>수입</th><th>성격</th><th>분배율</th><th>진아 귀속수입</th><th>입금</th>
          </tr></thead>
          <tbody>
            ${blocks.map(b=>{
              const TYPE_LBL={sched:'프로젝트',sched:'프로젝트',mission:'미션',event:'일정',edu:'교육',appt:'약속',paper:'논문',meeting:'회의',project:'프로젝트',study:'공부'};
              const typeLabel=TYPE_LBL[b.type]||b.type;
              const c=PALETTE[b.color]||PALETTE.mint;
              const isProject=b.type==='project';
              const paidBadge=isProject?(b.paid?'<span class="badge b-green" style="font-size:10px">입금</span>':'<span class="badge b-red" style="font-size:10px">미입금</span>'):'—';
              if(b.noIncome){
                return`<tr style="opacity:.5">
                  <td style="color:var(--text2);font-family:'DM Mono',monospace;font-size:11px">${b.date}</td>
                  <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${c.hex};flex-shrink:0"></span>${b.title}</span></td>
                  <td><span class="badge b-gray" style="font-size:10px">${typeLabel}</span></td>
                  <td colspan="4" style="color:var(--text3);font-size:11px">수입 없음</td>
                  <td>—</td>
                </tr>`;
              }
              return`<tr>
                <td style="color:var(--text2);font-family:'DM Mono',monospace;font-size:11px">${b.date}</td>
                <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${c.hex};flex-shrink:0"></span>${b.title}</span></td>
                <td><span class="badge b-gray" style="font-size:10px">${typeLabel}</span></td>
                <td style="font-weight:600;font-family:'DM Mono',monospace">${(b.income||0).toLocaleString()}</td>
                <td style="color:var(--text2)">${b.incomeType?b.incomeType+'%':'—'}</td>
                <td style="color:var(--text2)">${b.incomeRatio||100}%</td>
                <td style="font-weight:700;color:var(--accent);font-family:'DM Mono',monospace">${(b.jinaIncome||0).toLocaleString()}</td>
                <td>${paidBadge}</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot><tr class="income-total">
            <td colspan="3" style="font-weight:700">${parseInt(mo)}월 합계</td>
            <td style="font-weight:700;font-family:'DM Mono',monospace">${mTotal.toLocaleString()}</td>
            <td colspan="2"></td>
            <td style="font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)">${mJina.toLocaleString()}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;
  });

  list.innerHTML=html;
}

/* ═══════════════════════════════════════
